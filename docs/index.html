<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>3d-music-visualizer</title><script src="app.js"></script></head><body><div id="app"><div class="file-loader"><input type="file" id="file-input" accept="audio/mp3"/></div><div class="enter-vr-button"><button onclick="document.querySelector('a-scene').enterVR()">Enter VR</button></div><div class="audio-player"><audio id="audio" controls nodownload></audio></div><a-scene id="scene"><a-assets><img id="sky" src="assets/stars.jpg"/></a-assets><a-sky material="src: #sky"></a-sky><a-entity data-aframe-default-camera><a-entity camera="" wasd-controls="" look-controls="" rotation="0 0 0" position="0 2.5 0"></a-entity></a-entity><a-plane color="white" position="0 0 0" height="1" width="20" rotation="-90 0 0" scale="1 20 1"></a-plane><a-light type="point" color="blue" intensity="0" position="8 6 -8"></a-light><a-light type="point" color="orange" intensity="0" position="-8 6 -8"></a-light><a-light type="point" color="purple" intensity="0" position="8 6 8"></a-light><a-light type="point" color="red" intensity="0" position="-8 6 8"></a-light><a-entity position="-2.5 6 -10" text-geometry="size: 0.5; height: 0.1; bevelEnabled: true; bevelSize: 0.02; bevelThickness: 0.02; value: Home Night Club" material="color: #AAAAFF;"></a-entity></a-scene></div></body></html>
